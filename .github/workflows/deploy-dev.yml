name: CD (Deploy to Lightsail - Dev)

on:
    push:
        branches: ['dev']

permissions:
    contents: read

env:
    DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}
    BRANCH_TAG: ${{ github.ref_name }}

concurrency:
    group: deploy-dev
    cancel-in-progress: true

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set Docker tags
              run: |
                  echo "DOCKER_TAGS<<EOF" >> $GITHUB_ENV
                  echo "${{ env.DOCKER_IMAGE }}:${{ github.sha }}" >> $GITHUB_ENV
                  echo "${{ env.DOCKER_IMAGE }}:${{ env.BRANCH_TAG }}" >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Build and Push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.DOCKER_TAGS }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy-dev:
        needs: build-and-push
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Copy docker-compose.dev.yml to Server
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.LIGHTSAIL_HOST }}
                  username: ${{ secrets.LIGHTSAIL_USERNAME }}
                  key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                  port: 22
                  source: 'docker-compose.dev.yml'
                  target: '~/docker'
                  strip_components: 0

            - name: Deploy via SSH
              uses: appleboy/ssh-action@master
              env:
                  ENV_DEV: ${{ secrets.ENV_DEV }}
              with:
                  host: ${{ secrets.LIGHTSAIL_HOST }}
                  username: ${{ secrets.LIGHTSAIL_USERNAME }}
                  key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
                  port: 22
                  envs: ENV_DEV
                  script: |
                      set -e
                      echo "🚀 Starting dev deployment..."

                      cd ~/docker

                      # Deploy lock (prevents concurrent docker compose runs)
                      LOCK_FILE="/tmp/folioo-deploy.lock"
                      exec 9>"$LOCK_FILE"
                      flock 9
                      echo "🔒 Acquired lock: $LOCK_FILE"

                      # .env.dev 파일 생성 (GitHub Secrets에서)
                      echo "$ENV_DEV" > .env.dev

                      # Defensive cleanup for fixed container names
                      docker compose --env-file .env.dev -f docker-compose.dev.yml down --remove-orphans 2>/dev/null || true
                      docker rm -f folioo-server 2>/dev/null || true
                      docker rm -f folioo-postgres 2>/dev/null || true

                      # 최신 이미지 Pull & 재시작 (헬스체크 통과까지 대기)
                      docker compose --env-file .env.dev -f docker-compose.dev.yml pull
                      docker compose --env-file .env.dev -f docker-compose.dev.yml up -d --force-recreate --wait

                      # 헬스체크 추가 확인
                      echo "🔍 Verifying health..."
                      sleep 5
                      if curl -sf http://localhost:3000/health > /dev/null; then
                        echo "✅ Health check passed!"
                      else
                        echo "❌ Health check failed!"
                        docker compose --env-file .env.dev -f docker-compose.dev.yml logs --tail=50
                        exit 1
                      fi

                      # 사용하지 않는 이미지 정리
                      docker image prune -f

                      echo "✅ Dev deployment completed!"
