# ========================================
# Folioo Server - Dev Blue-Green (GCE 배포용)
# ========================================
# docker-compose.infra.yml (base) 위에 덮어쓰는 override 파일
#
# 사용법:
#   # Blue 슬롯 실행:
#   docker compose -f docker-compose.infra.yml -f docker-compose.dev.yml --profile blue up -d
#
#   # Green 슬롯 실행:
#   docker compose -f docker-compose.infra.yml -f docker-compose.dev.yml --profile green up -d
#
# Note:
#   로컬 개발용 파일은 docker-compose.yml 을 참고하세요.
# ========================================

services:
    # ── Redis (dev 전용) ──
    redis-dev:
        image: redis:8-alpine
        container_name: folioo-redis-dev
        restart: unless-stopped
        command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
        volumes:
            - redis-dev-data:/data
        deploy:
            resources:
                limits:
                    memory: 256M
                reservations:
                    memory: 128M
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
        networks:
            - folioo-network

    # ── Dev Blue Slot ──
    dev-blue:
        image: ${DOCKER_IMAGE:-asia-northeast3-docker.pkg.dev/folioo-ai/folioo-docker/folioo-server}:dev
        restart: unless-stopped
        depends_on:
            redis-dev:
                condition: service_healthy
        env_file:
            - path: .env.dev
              required: false
        environment:
            APP_PROFILE: dev
            TZ: Asia/Seoul
            REDIS_HOST: folioo-redis-dev
            REDIS_PORT: 6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 20s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.dev.rule=Host(`dev-api.folioo.ai.kr`)'
            - 'traefik.http.routers.dev.entrypoints=web'
            - 'traefik.http.services.dev.loadbalancer.server.port=3000'
            - 'traefik.http.services.dev.loadbalancer.server.scheme=http'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
        profiles:
            - blue
        networks:
            - folioo-network

    # ── Dev Green Slot ──
    dev-green:
        image: ${DOCKER_IMAGE:-asia-northeast3-docker.pkg.dev/folioo-ai/folioo-docker/folioo-server}:dev
        restart: unless-stopped
        depends_on:
            redis-dev:
                condition: service_healthy
        env_file:
            - path: .env.dev
              required: false
        environment:
            APP_PROFILE: dev
            TZ: Asia/Seoul
            REDIS_HOST: folioo-redis-dev
            REDIS_PORT: 6379
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 20s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.dev.rule=Host(`dev-api.folioo.ai.kr`)'
            - 'traefik.http.routers.dev.entrypoints=web'
            - 'traefik.http.services.dev.loadbalancer.server.port=3000'
            - 'traefik.http.services.dev.loadbalancer.server.scheme=http'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
        profiles:
            - green
        networks:
            - folioo-network

volumes:
    redis-dev-data:
