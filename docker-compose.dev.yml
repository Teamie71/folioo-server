# ========================================
# Folioo Server - 개발 서버 환경 (Dev)
# ========================================
# 사용법:
#   1. 이미지 최신화:
#      docker compose -f docker-compose.dev.yml pull
#
#   2. 컨테이너 실행 (재배포):
#      docker compose -f docker-compose.dev.yml up -d
#
#   3. 로그 확인:
#      docker compose -f docker-compose.dev.yml logs -f
#
#   4. 종료:
#      docker compose -f docker-compose.dev.yml down
# ========================================

services:
    # ========================================
    # Redis (개발 서버)
    # ========================================
    redis:
        image: redis:8-alpine
        container_name: folioo-redis
        restart: unless-stopped
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits:
                    memory: 128M
                reservations:
                    memory: 64M
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    # ========================================
    # NestJS Backend (개발 서버)
    # ========================================
    backend:
        image: hyoinkang/folioo:dev
        container_name: folioo-server
        restart: unless-stopped
        depends_on:
            redis:
                condition: service_healthy
        ports:
            - '3000:3000'
        env_file:
            - .env.dev
        environment:
            APP_PROFILE: dev
            TZ: Asia/Seoul
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    memory: 256M
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

volumes:
    redis-data:

networks:
    default:
        driver: bridge
