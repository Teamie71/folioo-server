# ========================================
# Folioo Server - Production Blue-Green Override
# ========================================
# Override 파일: docker-compose.infra.yml (base)과 함께 사용
#
# 사용법:
#   # Blue 슬롯 실행:
#   docker compose -f docker-compose.infra.yml -f docker-compose.prod.bluegreen.yml --profile blue up -d
#
#   # Green 슬롯 실행:
#   docker compose -f docker-compose.infra.yml -f docker-compose.prod.bluegreen.yml --profile green up -d
#
#   # 슬롯 전환 (blue → green):
#   docker compose -f docker-compose.infra.yml -f docker-compose.prod.bluegreen.yml --profile green up -d
#   docker compose -f docker-compose.infra.yml -f docker-compose.prod.bluegreen.yml --profile blue down
# ========================================

services:
    # ── PostgreSQL (prod) ──
    postgres-prod:
        image: pgvector/pgvector:pg15
        container_name: folioo-postgres-prod
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DB_USERNAME:-folioo}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-folioo}
            POSTGRES_DB: ${DB_SCHEMA:-folioo}
            TZ: Asia/Seoul
        volumes:
            - postgres-prod-data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-folioo}']
            interval: 10s
            timeout: 5s
            retries: 5
        deploy:
            resources:
                limits:
                    memory: 256M
                reservations:
                    memory: 128M
        logging:
            driver: 'gcplogs'
            options:
                labels: 'app=folioo-server,env=prod,service=postgres'
        networks:
            - folioo-network

    # ── Production Blue Slot ──
    prod-blue:
        image: ${DOCKER_IMAGE:-asia-northeast3-docker.pkg.dev/folioo-ai/folioo-docker/folioo-server}:latest
        restart: unless-stopped
        depends_on:
            postgres-prod:
                condition: service_healthy
        env_file:
            - path: .env.prod
              required: false
        environment:
            APP_PROFILE: prod
            TZ: Asia/Seoul
            DB_HOST: folioo-postgres-prod
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 20s
            timeout: 5s
            retries: 5
            start_period: 30s
        logging:
            driver: 'gcplogs'
            options:
                labels: 'app=folioo-server,env=prod,slot=blue'
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.prod.rule=Host(`prod-api.folioo.ai.kr`)'
            - 'traefik.http.routers.prod.entrypoints=web'
            - 'traefik.http.services.prod.loadbalancer.server.port=3000'
            - 'traefik.http.services.prod.loadbalancer.server.scheme=http'
        profiles:
            - blue
        networks:
            - folioo-network

    # ── Production Green Slot ──
    prod-green:
        image: ${DOCKER_IMAGE:-asia-northeast3-docker.pkg.dev/folioo-ai/folioo-docker/folioo-server}:latest
        restart: unless-stopped
        depends_on:
            postgres-prod:
                condition: service_healthy
        env_file:
            - path: .env.prod
              required: false
        environment:
            APP_PROFILE: prod
            TZ: Asia/Seoul
            DB_HOST: folioo-postgres-prod
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/health']
            interval: 20s
            timeout: 5s
            retries: 5
            start_period: 30s
        logging:
            driver: 'gcplogs'
            options:
                labels: 'app=folioo-server,env=prod,slot=green'
        labels:
            - 'traefik.enable=true'
            - 'traefik.http.routers.prod.rule=Host(`prod-api.folioo.ai.kr`)'
            - 'traefik.http.routers.prod.entrypoints=web'
            - 'traefik.http.services.prod.loadbalancer.server.port=3000'
            - 'traefik.http.services.prod.loadbalancer.server.scheme=http'
        profiles:
            - green
        networks:
            - folioo-network

volumes:
    postgres-prod-data:
